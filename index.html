<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexove.ai | Music Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-glow: #3a86ff;
            --deep-space: #030303;
            --glass-panel: rgba(18, 18, 18, 0.75);
            --border-light: rgba(255, 255, 255, 0.08);
            --font-primary: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--deep-space);
            color: #ffffff;
            font-family: var(--font-primary);
            overflow: hidden;
        }

        /* Unique Entrance Overlay */
        #gateway-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(58, 134, 255, 0.1) 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(12px);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .portal-card {
            background: var(--glass-panel);
            padding: 3rem 2rem;
            border-radius: 32px;
            text-align: center;
            width: 90%;
            max-width: 440px;
            border: 1px solid var(--border-light);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand-identity {
            width: auto;
            height: 90px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(58, 134, 255, 0.4));
        }

        .hero-text {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 1rem 0;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, #fff, var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            color: #888;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            font-weight: 300;
        }

        .action-trigger {
            background: #fff;
            color: #000;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 100px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-trigger:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            background: var(--accent-glow);
            color: #fff;
        }

        /* Background Visuals after launch */
        #main-view {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
            text-align: center;
        }
    </style>
</head>
<body>

    <section id="gateway-overlay">
        <div class="portal-card">
            <img src="Sophisticated AI Logo with Angular Elements.png" 
                 alt="Plexove" 
                 class="brand-identity">
            
            <h1 class="hero-text">plexove.ai</h1>
            <p class="sub-text">Architecting the future of sound. High-fidelity music intelligence, engineered in India.</p>
            
            <button class="action-trigger" onclick="unlockExperience()">Launch Engine</button>
        </div>
    </section>

    <main id="main-view">
        <div class="status-indicator">
            <h2 style="color: var(--accent-glow);">Plexove Engine Active</h2>
            <p style="color: #444;">Interface loaded via Voiceflow Runtime</p>
        </div>
    </main>

    <script type="text/javascript">
      (function(d, t) {
          var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
          v.onload = function() {
            window.voiceflow.chat.load({
              verify: { projectID: '69c62d7312a60769b90713ac' },
              url: 'https://general-runtime.voiceflow.com',
              versionID: 'production',
              voice: {
                url: "https://runtime-api.voiceflow.com"
              }
            });
          }
          v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
      })(document, 'script');

      function unlockExperience() {
          const overlay = document.getElementById('gateway-overlay');
          const main = document.getElementById('main-view');
          
          overlay.style.opacity = '0';
          overlay.style.pointerEvents = 'none';
          
          setTimeout(() => {
              overlay.style.display = 'none';
              main.style.opacity = '1';
              // Automatically open the Voiceflow Chat when Launched
              window.voiceflow.chat.open();
          }, 700);
      }
    </script>

</body>
</html>
