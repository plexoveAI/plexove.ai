<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-glow: #3a86ff;
            --deep-space: #030303;
            --glass-panel: rgba(18, 18, 18, 0.75);
            --border-light: rgba(255, 255, 255, 0.08);
            --font-primary: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--deep-space);
            color: #ffffff; font-family: var(--font-primary);
            overflow: hidden;
        }

        #gateway-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(58, 134, 255, 0.1) 0%, #000 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(12px);
            transition: all 0.7s ease;
        }

        .portal-card {
            background: var(--glass-panel); padding: 3rem 2rem;
            border-radius: 32px; text-align: center;
            width: 90%; max-width: 440px;
            border: 1px solid var(--border-light);
        }

        /* Layout for ads and content */
        #main-view {
            display: none; height: 100vh; width: 100%;
            grid-template-columns: 160px 1fr;
            grid-template-rows: 1fr 90px;
        }

        #left-ad-sidebar { grid-row: 1 / 3; background: rgba(255,255,255,0.02); border-right: 1px solid var(--border-light); }
        
        #center-content { 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            text-align: center; padding: 20px;
        }

        #bottom-ad-bar { 
            grid-column: 2; background: rgba(255,255,255,0.02); 
            border-top: 1px solid var(--border-light);
            display: flex; justify-content: center; align-items: center;
        }

        .hero-text { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .action-trigger { background: #fff; color: #000; border: none; padding: 1.2rem 3rem; border-radius: 100px; font-weight: 600; cursor: pointer; text-transform: uppercase;}
    </style>
</head>

    <section id="gateway-overlay">

            <button class="action-trigger" onclick="unlockExperience()">Launch Engine</button>
        </div>
    </section>

    <main id="main-view">

            <h2 style="color: var(--accent-glow); margin-top: 20px;">Engine Active</h2>
        </section>

        <footer id="bottom-ad-bar">
            <script type="text/javascript">
                atOptions = { 'key' : '2ccbeaa0c3b958c49196833a1984c9eb', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/2ccbeaa0c3b958c49196833a1984c9eb/invoke.js"></script>

          if (window.voiceflow && window.voiceflow.chat) { window.voiceflow.chat.open(); }

</body>
</html>
